<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application form</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
  <div class="container">
    <div class="apply-box">
        <h1>Job Application Form</h1>
        <form action="">
        <div class="form-container">
        <div class="form-control">
       <label for="first-name">First name</label>
       <input id="first-name" name="first-name" placeholder="Enter first name">
        </div>
 <div class="form-control">
       <label for="last-name">Last name</label>
       <input id="last-name" name="last-name" placeholder="Enter last name">
        </div>
 <div class="form-control">
       <label for="email">Email</label>
       <input id="email" type="email"   name="email" placeholder="Enter email">
        </div>
         <div class="form-control">
       <label for="job-role">Job Role</label>
       <select>
        <option value="">Select job role</option>
        <option value="frontend">Frontend developer</option>
        <option value="backend">Backend developer</option>
        <option value="full stack developer">Full stack developer</option>
       </select>
        </div>
        <div class="textarea-control">
       <label for="address">Address</label>
       <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter address"></textarea>
        </div>
        <div class="form-control">
       <label for="pincode">Pincode</label>
       <input id="pincode" type="number"   name="pincode">
        </div>
        <div class="form-control">
       <label for="city">City</label>
       <input id="city"   name="city" placeholder="Enter city">
        </div>
        <div class="form-control">
       <label for="email">Email</label>
       <input id="email" type="email"   name="email" placeholder="Enter email">
        </div>
        <div class="form-control">
       <label for="Start-date">Start date</label>
       <input id="Start-date" type="date"   name="Start-date" >
        </div>
        <div class="form-control">
       <label for="Upload-your-cv">Upload your CV</label>
       <input id="Upload-your-cv" type="file"   name="Upload-your-cv" >
        </div>
        </div>
        <div class="button-control">
       <button type="submit">Apply Now</button>
        </div>
        </form>
    </div>
  </div>
</body>
</html>
